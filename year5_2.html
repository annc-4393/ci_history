<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1969년 쌍용그룹 로고</title>
		<meta name="description" content="1969년 쌍용그룹의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="쌍용, 로고, 연표, 1969">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="s_1_2.png" alt="한일 국교정상화와 건설 수요 증가">
		        <p>1965년 한일 국교정상화 이후 건설 수요 증가</p>
		    </div>

		    <div class="item">
		        <img src="s_2_2.png" alt="경부고속도로 계획 발표">
		        <p>1967년 경부고속도로 계획 발표</p>
		    </div>

		    <div class="item">
		        <img src="s_3_2.png" alt="국내 대표 시멘트 기업으로 성장">
		        <p>1968년 국내 대표 시멘트 기업으로 성장</p>
		    </div>

		</div>
	</body>
</html>
