<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1989년 쌍용그룹 로고</title>
		<meta name="description" content="19789년 쌍용그룹의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="쌍용, 로고, 연표, 1989">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="s_1_4.png" alt="동아자동차 인수">
		        <p>1986년 동아자동차 인수</p>
		    </div>

		    <div class="item">
		        <img src="s_2_4.png" alt="쌍용자동차 출범">
		        <p>1988년 쌍용자동차 출범</p>
		    </div>

		    <div class="item">
		        <img src="s_3_4.png" alt="IMF 외환위기, 대우그룹에 쌍용자동차 매각">
		        <p>1998년 IMF 외환위기, 대우그룹에 쌍용자동차 매각</p>
		    </div>

		</div>
	</body>
</html>
