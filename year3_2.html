<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1993년 부영그룹 로고</title>
		<meta name="description" content="1993년 부영그룹의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="부영, 로고, 연표, 1993">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="b_1_2.png" alt="사명 변경">
		        <p>1993년 삼신엔지니어링 → 부영 사명 변경</p>
		    </div>

		    <div class="item">
		        <img src="b_2_2.png" alt="임대주택 사업 진출">
		        <p>1990년대 전국 임대주택 공급 확대</p>
		    </div>

		    <div class="item">
		        <img src="b_3_2.png" alt="임대주택">
		        <p>1990년대 부영 사랑으로 임대주택</p>
		    </div>

		</div>
	</body>
</html>
