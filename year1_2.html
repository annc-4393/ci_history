<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1975년 농심 로고</title>
		<meta name="description" content="1975년 농심의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="농심, 로고, 연표, 1975">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="n_1_2.png" alt="농심라면 신문 광고">
		        <p>1975년 농심라면의 신문 광고</p>
		    </div>

		    <div class="item">
		        <img src="n_2_2.png" alt="농심라면">
		        <p>1975년 농심라면 패키지</p>
		    </div>

		    <div class="item">
		        <img src="n_3_2.png" alt="농심라면 광고 영상">
		        <p>1975년 농심라면 광고 영상</p>
		    </div>

		</div>
	</body>
</html>
