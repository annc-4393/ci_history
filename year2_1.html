<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1969년 대한항공 로고</title>
		<meta name="description" content="1969년 대한항공의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="대한항공, 로고, 연표, 1969">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="k_1.png" alt="단체 사진">
		        <p>1969년 대한항공 최초 운행 기념 사진</p>
		    </div>

		    <div class="item">
		        <img src="k_2.png" alt="승객 탑승">
		        <p>1969년 대한항공 최초 운행 승객 탑승</p>
		    </div>

		    <div class="item">
		        <img src="k_3.png" alt="비행기">
		        <p>1969년 대한항공 최초의 비행기</p>
		    </div>

		</div>
	</body>
</html>
