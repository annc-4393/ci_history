<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>연표</title>
	<meta name="description" content="포스코의 ci 변천사에 따른 연표를 소개합니다.">
	<meta name="keywords" content="포스코, ci, 변천사, 연표">
	<link rel="stylesheet" href="style.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

 	body{
 		background-image:url("posco.png");
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;
	    height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
}

	body::after{
	    content:"";
	    position:absolute;
	    bottom:0;
	    left:0;
	    width:100%;
	    height:65%;

	    background-color: rgba(255, 255, 255, 0.9) ;

	    z-index:0;
}

	.title{
	    position:absolute;

	    top:60px;
	    left:50%;
	    transform:translateX(-50%);

	    color:white;
		font-weight:400;
		font-size: 20pt;
		letter-spacing:4px;

	    z-index:1;
}

	.timeline{
	    position:relative;
	    z-index:1;
	    width:80%;
	    max-width:1000px;

	    transform:translateY(130px);
}

	.timeline::before{
	    content:"";
	    position:absolute;
	    top:0;
	    left:0;
	    width:100%;
	    height:2px;
	    background:#1F3A5F;
}

	.years{
	    display:flex;
	    justify-content:space-between;
	    padding-top:30px;
}

	.year{
	    position:relative;
	    color:#1F3A5F;
	    text-decoration:none;
	    font-size:32px;
	    font-weight:300;
}

	.year::before{
	    content:"";
	    position:absolute;
	    width:16px;
	    height:16px;
	    border-radius:50%;
	    background:#1F3A5F;

	    left:50%;
	    transform:translateX(-50%);
	    top:-39px;
}

	.year:hover{
	    color:#70bcef;
	    text-decoration:underline;
}

	.year:hover::before{
	    background:#70bcef;
}

	.preview{
	    position:absolute;
	    bottom:100px;
	    left:50%;
	    transform:translateX(-50%);

	    width:180px;
	    height:auto;

	    opacity:0;
	    visibility:hidden;
	    transition:0.3s;
}

	.year:hover .preview{
		opacity:1;
		visibility:visible;
}

</style>
</head>

<body>

<h1 class="title">포스코 CI 변천사에 따른 연표</h1>

<div class="timeline">
    <div class="years">
        <a href="year4_1.html" class="year">
    		<img src="1968_2.png" class="preview">1968
		</a>
        <a href="year4_2.html" class="year">
    		<img src="1990.png" class="preview">1990
		</a>
        <a href="year4_3.html" class="year">
    		<img src="1994.png" class="preview">1994
		</a>
        <a href="year4_4.html" class="year">
    		<img src="2001.png" class="preview">2001
		</a>
    </div>
</div>

</body>
</html>
