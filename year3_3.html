<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1998년 부영그룹 로고</title>
		<meta name="description" content="1998년 부영그룹의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="부영, 로고, 연표, 1998">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="b_1_3.png" alt="외환 위기, 임대주택 공급 확대">
		        <p>1997년 IMF 외환 위기, 임대주택 공급 확대</p>
		    </div>

		    <div class="item">
		        <img src="b_2_3.png" alt="전국 대표 임대주택 기업">
		        <p>2000년대 전국 대표 임대주택 기업으로 성장</p>
		    </div>

		    <div class="item">
		        <img src="b_3_3.png" alt="우정학사 기증 사업 확대">
		        <p>2000년대 우정학사 기증 사업 확대</p>
		    </div>

		</div>
	</body>
</html>
