<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1983년 부영그룹 로고</title>
		<meta name="description" content="1983년 부영그룹의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="부영, 로고, 연표, 1983">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="b_1.png" alt="삼신엔지니어링 창립">
		        <p>1983년 삼신엔지니어링 창립</p>
		    </div>

		    <div class="item">
		        <img src="b_2.png" alt="임대주택 사업 진출">
		        <p>1980년대 임대주택 사업 진출</p>
		    </div>

		    <div class="item">
		        <img src="b_3.png" alt="교육시설 기증">
		        <p>1980년대 교육시설 기증 시작</p>
		    </div>

		</div>
	</body>
</html>
