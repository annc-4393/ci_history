<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1963년 쌍용그룹 로고</title>
		<meta name="description" content="1963년 쌍용그룹의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="쌍용, 로고, 연표, 1963">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="s_1.png" alt="쌍용그룹의 모태 기업 성장">
		        <p>1948년 쌍용그룹의 모태 기업 성장</p>
		    </div>

		    <div class="item">
		        <img src="s_2.png" alt="쌍용양회 설립">
		        <p>1962년 쌍용양회 설립</p>
		    </div>

		    <div class="item">
		        <img src="s_3.png" alt="동해 공장 가동">
		        <p>1964년 동해 공장 가동</p>
		    </div>

		</div>
	</body>
</html>
