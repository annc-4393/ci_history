<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>1994년 포스코 로고</title>
		<meta name="description" content="1994년 포스코의 로고를 소개하는 페이지입니다.">
		<meta name="keywords" content="포스코, 로고, 연표, 1994">
		<link rel="stylesheet" href="style.css">

	<style>
		*{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
	    background-color: #fdf9f6;
	    background-size:cover;
	    background-position:center;
	    background-repeat:no-repeat;

	    min-height:100vh;
	    display:flex;
	    justify-content:center;
	    align-items:center;

	    font-family:'Pretendard', sans-serif;

	    position:relative;
	}

	.imgii{
		display:flex;
	    flex-direction:column;
	    align-items:center;
	    gap:30px;
	    margin-top:50px;
	    margin-bottom:50px;
	}

	.imgii img{
		width: 600px;
		height: auto;
	}

	.item{
    display:flex;
    flex-direction:column;
    align-items:center;
}

	.item p{
    margin-top:15px;
    font-size:18px;
    text-align:center;
}

	</style>
	</head>

	<body>
		<div class="imgii">

		    <div class="item">
		        <img src="p_1_3.png" alt="광양건설기 건설">
		        <p>1994년 포스코 뉴욕증시 상장 조인식</p>
		    </div>

		    <div class="item">
		        <img src="p_2_3.png" alt="광양건설기 지반 공사">
		        <p>1997년 포스코 사외이사제 도입</p>
		    </div>

		    <div class="item">
		        <img src="p_3_3.png" alt="광양건설기 종합준공식">
		        <p>1998년 포스코 민영화 관련 신문</p>
		    </div>

		</div>
	</body>
</html>
